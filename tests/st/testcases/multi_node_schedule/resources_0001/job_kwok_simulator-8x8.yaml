apiVersion: v1
kind: ConfigMap
metadata:
  name: reset-config-default-test-8x8    
  namespace: default                      
  labels:
    reset: "true"
data:
  reset.json: |
    {
        "status":"initializing"
    }
  checkCode: ""
---
apiVersion: mindxdl.gitee.com/v1
kind: AscendJob
metadata:
  name: default-test-8x8
  labels:
    framework: pytorch
    tor-affinity: "null"
    fault-scheduling: force
    fault-retry-times: "3"
    pod-rescheduling: "on"
    subHealthyStrategy: "ignore"
    ring-controller.atlas: ascend-910b
spec:
  schedulerName: volcano   
  runPolicy:
    schedulingPolicy:     
      minAvailable: 8
      queue: default
  successPolicy: AllWorkers
  replicaSpecs:
    Master:
      replicas: 1
      restartPolicy: Never
      template:
        metadata:
          labels:
            ring-controller.atlas: ascend-910b
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: job-name
                        operator: In
                        values:
                          - default-test-pytorch
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            host-arch: huawei-arm
            accelerator-type: module-910b-8
          containers:
            - name: ascend # do not modify
              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent
              env:
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: XDL_IP                   
                  valueFrom:
                    fieldRef:
                      fieldPath: status.hostIP
                
                - name: ASCEND_VISIBLE_DEVICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['huawei.com/Ascend910']               
                - name: PYTORCH_NPU_ALLOC_CONF
                  value: expandable_segments:False
              command:                           
                - /bin/bash
                - -c
              args: [ "sleep 100000; " ]
              ports:                          
                - containerPort: 2222         
                  name: ascendjob-port        
              resources:
                limits:
                  huawei.com/Ascend910: 8
                requests:
                  huawei.com/Ascend910: 8
              volumeMounts:
                - name: localtime
                  mountPath: /etc/localtime
          volumes:
            - name: localtime
              hostPath:
                path: /etc/localtime
    Worker:
      replicas: 7
      restartPolicy: Never
      template:
        metadata:
          labels:
            ring-controller.atlas: ascend-910b
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: job-name
                        operator: In
                        values:
                          - default-test-pytorch
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            host-arch: huawei-arm
            accelerator-type: module-910b-8
          containers:
            - name: ascend
              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent
              env:
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: XDL_IP                   
                  valueFrom:
                    fieldRef:
                      fieldPath: status.hostIP
                
                - name: ASCEND_VISIBLE_DEVICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['huawei.com/Ascend910']               
                - name: PYTORCH_NPU_ALLOC_CONF
                  value: expandable_segments:False
              command:                          
                - /bin/bash
                - -c
              args: [ "sleep 100000; " ]
              ports:                          
                - containerPort: 2222        
                  name: ascendjob-port       
              resources:
                limits:
                  huawei.com/Ascend910: 8
                requests:
                  huawei.com/Ascend910: 8
              volumeMounts:
                - name: localtime
                  mountPath: /etc/localtime
                - name: ranktable
                  mountPath: /user/mindx/ranktable
          volumes:
            - name: localtime
              hostPath:
                path: /etc/localtime
            - name: ranktable           
              hostPath:
                path: /user/mindx-dl/ranktable/default.default-test-8x8