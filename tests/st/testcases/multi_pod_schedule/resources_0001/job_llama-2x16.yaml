apiVersion: v1
kind: ConfigMap
metadata:
  name: reset-config-default-test-2x16
  namespace: default
  labels:
    reset: "true"
data:
  reset.json: |
    {
        "status":"initializing"
    }
  checkCode: ""
---
apiVersion: mindxdl.gitee.com/v1
kind: AscendJob
metadata:
  name: default-test-2x16
  labels:
    framework: pytorch
    tor-affinity: "null"
    fault-scheduling: force
    fault-retry-times: "3"
    pod-rescheduling: "on"
    subHealthyStrategy: "ignore"
    ring-controller.atlas: ascend-910b
  annotations:
    sp-block: "32"

spec:
  schedulerName: volcano
  runPolicy:
    schedulingPolicy:
      minAvailable: 2
      queue: default
  successPolicy: AllWorkers
  replicaSpecs:
    Master:
      replicas: 1
      restartPolicy: Never
      template:
        metadata:
          labels:
            ring-controller.atlas: ascend-910b
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: job-name
                        operator: In
                        values:
                          - default-test-pytorch
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            host-arch: huawei-arm
            accelerator-type: module-a3-16-super-pod
          containers:
            - name: ascend
              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent
              env:
                - name: HCCL_SNAPSHOT_SAVE_PATH
                  value: /opt/hccl_snapshot
                - name: ELASTIC_PROCESS_RECOVER_ENABLE
                  value: "1"
                - name: PROCESS_RECOVER
                  value: "on"
                - name: TTP_PORT
                  value: "8000"
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: XDL_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.hostIP

                - name: ASCEND_VISIBLE_DEVICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['huawei.com/Ascend910']
                - name: PYTORCH_NPU_ALLOC_CONF
                  value: expandable_segments:False
              command:
                - /bin/bash
                - -c
              args: [ "sleep 100000; cd /home/simulator/Megatron-LM/Megatron-LM; bash /train-sh/pretrain-llama70b.sh" ]
              ports:
                - containerPort: 2222
                  name: ascendjob-port
                - containerPort: 8000
                  name: ttp-port
              resources:
                limits:
                  huawei.com/Ascend910: 16
                requests:
                  huawei.com/Ascend910: 16
    Worker:
      replicas: 1
      restartPolicy: Never
      template:
        metadata:
          labels:
            ring-controller.atlas: ascend-910b
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: job-name
                        operator: In
                        values:
                          - default-test-pytorch
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            host-arch: huawei-arm
            accelerator-type: module-a3-16-super-pod
          containers:
            - name: ascend
              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent
              env:
                - name: HCCL_SNAPSHOT_SAVE_PATH
                  value: /opt/hccl_snapshot
                - name: ELASTIC_PROCESS_RECOVER_ENABLE
                  value: "1"
                - name: PROCESS_RECOVER
                  value: "on"
                - name: TTP_PORT
                  value: "8000"
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: XDL_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.hostIP
                - name: ASCEND_VISIBLE_DEVICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['huawei.com/Ascend910']
                - name: PYTORCH_NPU_ALLOC_CONF
                  value: expandable_segments:False
              command:
                - /bin/bash
                - -c
              args: [ "sleep 100000; cd /home/simulator/Megatron-LM/Megatron-LM; bash /train-sh/pretrain-llama70b.sh" ]
              ports:
                - containerPort: 2222
                  name: ascendjob-port
                - containerPort: 8000
                  name: ttp-port
              resources:
                limits:
                  huawei.com/Ascend910: 16
                requests:
                  huawei.com/Ascend910: 16